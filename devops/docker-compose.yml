services:
  postgres:
    image: postgres:17-alpine
    container_name: account-ledger-postgres
    environment:
      POSTGRES_DB: account_ledger_dev
      POSTGRES_USER: ledger_dev
      POSTGRES_PASSWORD: ledger_dev_pwd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger_dev -d account_ledger_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: devops/Dockerfile
    container_name: account-ledger-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=account_ledger_dev;Username=ledger_dev;Password=ledger_dev_pwd
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
