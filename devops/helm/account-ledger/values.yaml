namespace:
  create: true
  name: account-ledger-dev

api:
  replicaCount: 1
  image:
    repository: account-ledger-api
    tag: dev
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  env:
    ASPNETCORE_ENVIRONMENT: Development
    ASPNETCORE_URLS: http://+:8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  probes:
    path: /healthz
    readinessInitialDelaySeconds: 10
    readinessPeriodSeconds: 10
    livenessInitialDelaySeconds: 20
    livenessPeriodSeconds: 20

secret:
  create: true
  name: account-ledger-secret
  connectionString: ""

postgres:
  enabled: true
  name: postgres
  image:
    repository: postgres
    tag: 17-alpine
    pullPolicy: IfNotPresent
  service:
    port: 5432
    targetPort: 5432
  auth:
    database: account_ledger_dev
    username: ledger_dev
    password: ledger_dev_pwd
  persistence:
    enabled: true
    name: postgres-data
    accessModes:
      - ReadWriteOnce
    size: 2Gi
    storageClassName: ""
  resources: {}
  probes:
    readinessInitialDelaySeconds: 10
    readinessPeriodSeconds: 10
    livenessInitialDelaySeconds: 20
    livenessPeriodSeconds: 20
